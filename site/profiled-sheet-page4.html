    }
    classFilter.addEventListener("change", () => {
      syncCoatingOptions();
      syncThicknessOptions();
      render();
    });
    coatingFilter.addEventListener("change", () => {
      syncThicknessOptions();
      render();
    });
    thicknessFilter.addEventListener("change", render);
    if (showSpecialRows) {
      showSpecialRows.addEventListener("change", render);
    }
    render();
  </script>
</body>
</html>
